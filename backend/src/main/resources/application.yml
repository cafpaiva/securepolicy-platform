server:
  port: 8080

spring:
  application:
    name: securepolicy-api
  datasource:
    url: jdbc:h2:mem:securepolicy;MODE=MYSQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/securepolicy}
    username: ${MYSQL_USER:securepolicy}
    password: ${MYSQL_PASSWORD:securepolicy}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQL8Dialect

---
spring:
  config:
    activate:
      on-profile: oracle
  datasource:
    url: ${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${ORACLE_USER:securepolicy}
    password: ${ORACLE_PASSWORD:securepolicy}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.Oracle12cDialect

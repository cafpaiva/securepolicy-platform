name: Divida tecnica
description: Refatoracao, melhoria interna ou reducao de risco tecnico
title: "refactor: "
labels: ["type:tech-debt"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema tecnico
      description: Qual risco, duplicacao ou acoplamento esta demanda reduz?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposta
      description: Qual mudanca tecnica sera feita?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de aceite
    validations:
      required: true

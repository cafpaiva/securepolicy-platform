name: Deploy AKS

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  NAMESPACE: securepolicy
  BACKEND_IMAGE_NAME: securepolicy-api
  REACT_IMAGE_NAME: securepolicy-react
  ANGULAR_IMAGE_NAME: securepolicy-angular-mfe

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Login to Azure Container Registry
        run: az acr login --name "${ACR_NAME}"
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}

      - name: Set image tags
        run: |
          echo "BACKEND_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "REACT_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/${REACT_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ANGULAR_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/${ANGULAR_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE" ./backend

      - name: Build React image
        run: docker build --build-arg VITE_ANGULAR_MFE_URL="${ANGULAR_MFE_URL}" -t "$REACT_IMAGE" ./frontend-react
        env:
          ANGULAR_MFE_URL: ${{ vars.ANGULAR_MFE_URL || '/mfe/' }}

      - name: Build Angular MFE image
        run: docker build -t "$ANGULAR_IMAGE" ./frontend-angular-mfe

      - name: Push images
        run: |
          docker push "$BACKEND_IMAGE"
          docker push "$REACT_IMAGE"
          docker push "$ANGULAR_IMAGE"

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group "${RESOURCE_GROUP}" --name "${AKS_CLUSTER_NAME}" --overwrite-existing
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Render Kubernetes manifests
        run: |
          mkdir -p rendered-k8s
          cp k8s/*.yaml rendered-k8s/
          sed -i "s|__BACKEND_IMAGE__|${BACKEND_IMAGE}|g" rendered-k8s/backend.yaml
          sed -i "s|__REACT_IMAGE__|${REACT_IMAGE}|g" rendered-k8s/frontend-react.yaml
          sed -i "s|__ANGULAR_IMAGE__|${ANGULAR_IMAGE}|g" rendered-k8s/frontend-angular-mfe.yaml

      - name: Deploy to AKS
        run: |
          kubectl apply -f rendered-k8s/
          kubectl rollout status deployment/securepolicy-api -n "$NAMESPACE" --timeout=180s
          kubectl rollout status deployment/securepolicy-react -n "$NAMESPACE" --timeout=180s
          kubectl rollout status deployment/securepolicy-angular-mfe -n "$NAMESPACE" --timeout=180s

      - name: Show public endpoints
        run: kubectl get services -n "$NAMESPACE"

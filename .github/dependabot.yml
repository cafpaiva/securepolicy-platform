version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "backend"

  - package-ecosystem: "npm"
    directory: "/frontend-react"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      react-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "frontend"

  - package-ecosystem: "npm"
    directory: "/frontend-angular-mfe"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      angular-mfe-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "microfrontend"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
